name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Regenerate JSON manifests from source files on every deploy
      - name: Generate Photo Manifest
        run: node scripts/generate-photos.js

      - name: Generate Blog Manifest
        run: node scripts/generate-blog.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repo (no build step needed — vanilla JS)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
