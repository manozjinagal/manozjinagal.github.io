<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Manoz Jinagal — Blog. Thoughts on technology, programming, life and the cosmos."/>
<title>Blog — Manoz Jinagal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,600;1,200;1,300&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/styles/base.css"/>
<link rel="stylesheet" href="src/styles/components.css"/>
<link rel="stylesheet" href="src/styles/animations.css"/>
</head>
<body>

<div id="progress-bar"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="toast"></div>
<canvas id="star-canvas"></canvas>
<div id="nebula"></div>

<svg id="rocket-indicator" viewBox="0 0 18 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M9 1C9 1 3.5 7 3.5 15H14.5C14.5 7 9 1 9 1Z" fill="#ff6030" stroke="#ff9060" stroke-width=".4"/>
  <rect x="6.5" y="14" width="5" height="7" rx="1" fill="#a066ff"/>
  <ellipse cx="9" cy="23" rx="2.5" ry="4.5" fill="url(#fl3)"/>
  <defs><radialGradient id="fl3" cx="50%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff"/><stop offset="35%" stop-color="#ff8800"/><stop offset="100%" stop-color="#ff3300" stop-opacity="0"/></radialGradient></defs>
</svg>

<nav id="nav">
  <a class="nav-logo" href="index.html">Manoz Jinagal</a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
    <a href="photography.html">Photography</a>
    <a href="blog.html" class="active">Blog</a>
  </div>
  <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="wrap">
  <!-- Page hero -->
  <div class="page-hero section visible">
    <p class="page-hero-tag">// Signal Dispatches</p>
    <h1 class="page-hero-title">
      Trans<span>missions</span>
    </h1>
    <p class="page-hero-sub">Thoughts on technology, programming, enterprise systems, chess, photography — and everything in between the stars.</p>
  </div>

  <!-- Category filter -->
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="all">All</button>
  </div>

  <!-- Post count -->
  <p id="post-count" style="font-family:'Space Mono',monospace;font-size:9px;color:#4a6080;letter-spacing:.1em;margin-bottom:28px;"></p>

  <!-- Blog grid -->
  <div class="blog-grid" id="blog-grid">
    <div class="spinner" style="grid-column:1/-1"></div>
  </div>
</div>

<div class="wrap">
<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-name">Manoz Jinagal</span>
    <span class="footer-copy">© 2026 · TRANSMISSION ONGOING</span>
  </div>
</footer>
</div>

<script type="module">
import { initStarfield, initNebula } from './src/utils/canvas.js';
initStarfield();
initNebula();

// Cursor
const cur=document.getElementById('cursor'),curR=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animR(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(animR);})();

// Scroll
const rocket=document.getElementById('rocket-indicator'),prog=document.getElementById('progress-bar');
window.addEventListener('scroll',()=>{const p=window.scrollY/(document.body.scrollHeight-window.innerHeight);prog.style.width=(p*100)+'%';rocket.style.top=(16+p*(window.innerHeight-52))+'px';},{passive:true});
rocket.style.top='16px';

// Hamburger
document.getElementById('hamburger')?.addEventListener('click',()=>document.getElementById('nav-links').classList.toggle('open'));

// Hover cursor
function addHoverCursor(els){ els.forEach(el=>{ el.addEventListener('mouseenter',()=>{cur.classList.add('hovering');curR.classList.add('hovering');}); el.addEventListener('mouseleave',()=>{cur.classList.remove('hovering');curR.classList.remove('hovering');}); }); }
addHoverCursor(document.querySelectorAll('a,button'));

// ── BLOG ENGINE ──
let allPosts = [], filtered = [];

function formatDate(dateStr) {
  try {
    return new Date(dateStr).toLocaleDateString('en-IN', { year:'numeric', month:'short', day:'numeric' });
  } catch(_) { return dateStr; }
}

async function loadBlog() {
  const grid = document.getElementById('blog-grid');
  try {
    const res  = await fetch('public/blog/blog.json');
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    allPosts   = data.posts || [];

    // Build category tabs
    const tabs = document.getElementById('cat-tabs');
    const cats = ['all', ...data.categories];
    tabs.innerHTML = cats.map(c => {
      const count = c === 'all' ? allPosts.length : allPosts.filter(p=>p.category===c).length;
      return `<button class="cat-tab${c==='all'?' active':''}" data-cat="${c}">${c === 'all' ? 'All' : c} <span style="opacity:.5">${count}</span></button>`;
    }).join('');
    tabs.querySelectorAll('.cat-tab').forEach(btn => btn.addEventListener('click', () => {
      tabs.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterPosts(btn.dataset.cat);
    }));

    if (allPosts.length === 0) throw new Error('empty');
    filterPosts('all');
  } catch(_) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <p style="font-size:32px;margin-bottom:16px;">✍️</p>
        <p style="color:#ddeeff;font-size:14px;margin-bottom:8px;">No blog posts yet.</p>
        <p>Create a Markdown file in <code style="color:#89c4ff">public/blog/</code> to get started:</p>
        <code>
public/blog/2024-03-15-my-first-post.md<br>
<br>
Add frontmatter at the top:<br>
---<br>
title: My First Post<br>
date: 2024-03-15<br>
category: Tech<br>
excerpt: A short preview shown in the listing.<br>
---<br>
<br>
Your markdown content here...<br>
<br>
Then run: node scripts/generate-blog.js
        </code>
      </div>`;
    document.getElementById('post-count').textContent = '// 0 posts — write something!';
  }
}

function filterPosts(cat) {
  filtered = cat === 'all' ? [...allPosts] : allPosts.filter(p => p.category === cat);
  document.getElementById('post-count').textContent = `// ${filtered.length} post${filtered.length!==1?'s':''}`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('blog-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>No posts in this category yet.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((post, i) => `
    <a class="blog-card card" href="blog-post.html?post=${encodeURIComponent(post.file)}" style="transition-delay:${(i%8)*60}ms;text-decoration:none;">
      ${post.cover
        ? `<img class="blog-cover" src="${post.cover}" alt="${post.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'blog-cover-placeholder\\'>${post.category}</div>'"/>`
        : `<div class="blog-cover-placeholder">${post.category}</div>`}
      <div class="blog-body">
        <div class="blog-meta">
          <span class="blog-cat">${post.category}</span>
          <span class="blog-date">${formatDate(post.date)}</span>
        </div>
        <h2 class="blog-title">${post.title}</h2>
        <p class="blog-excerpt">${post.excerpt}</p>
        ${post.tags && post.tags.length ? `<div class="proj-tags" style="margin-top:12px">${post.tags.map(t=>`<span class="proj-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="blog-footer">
          <span class="blog-read-time">${post.readingTime}</span>
          <span class="blog-read-link">Read →</span>
        </div>
      </div>
    </a>`).join('');

  // Entrance animation
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);} });
  },{threshold:.05});
  grid.querySelectorAll('.blog-card').forEach(el => {
    obs.observe(el);
    addHoverCursor([el]);
  });
}

loadBlog();
</script>
</body>
</html>
